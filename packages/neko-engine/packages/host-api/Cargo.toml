[package]
name = "neko-host-api"
version.workspace = true
edition.workspace = true
description = "Controller layer for Neko Engine - ActionRouter, Controllers, and Registries"
license.workspace = true

[lib]
crate-type = ["lib"]

[dependencies]
# Shared types
neko-engine-types = { path = "../engine-types" }

# Core services
neko-engine-kernel = { path = "../engine-kernel", features = [] }
neko-runtime-media = { path = "../runtime-media" }

# Async runtime
tokio.workspace = true
tokio-util = { version = "0.7", features = ["rt"] }

# Serialization
serde.workspace = true
serde_json.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Logging
tracing.workspace = true

# Utilities
uuid.workspace = true
bytemuck.workspace = true

# Base64 encoding for retained media payloads
base64.workspace = true
tempfile = "3"

[features]
default = []

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros"] }
tokio-util = { version = "0.7", features = ["rt"] }
image = { workspace = true, features = ["hdr"] }
