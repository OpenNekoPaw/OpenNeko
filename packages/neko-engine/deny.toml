[advisories]
ignore = [
    # number_prefix — unmaintained, transitive dep from indicatif (progress bars)
    "RUSTSEC-2025-0119",
    # paste — unmaintained, no replacement available yet
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "AGPL-3.0-or-later",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-2.1-or-later",
    "LGPL-3.0-or-later",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unlicense",
    "WTFPL",
    "Zlib",
]

[sources]
allow-git = []

[bans]
# base64 v0.13 (gltf) + v0.22 (ours) — transitive, can't unify
skip = [
    { crate = "base64@0.13.1" },
]
