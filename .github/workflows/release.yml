# Release workflow — triggered by version tags (e.g. v0.1.0)
#
# Jobs:
#   1. validate-release: Validate tag, main ancestry, and publishable manifests
#   2. release-tests:    Re-run deterministic tests at the validated tag
#   3. release-openneko: Build one complete OpenNeko VSIX per supported platform
#   4. create-release:  Publish only the two signed-off platform artifacts
#
# Usage:
#   Create a vX.Y.Z tag from main in GitHub; the tag supplies the manifest version.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  validate-release:
    name: Validate Release Source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Fetch main ancestry
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Validate release source
        run: node scripts/validate-release-source.mjs

  release-tests:
    name: Release Tests
    needs: [validate-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Project release manifest versions
        run: node scripts/project-release-version.mjs

      - name: Enable Corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  release-openneko:
    name: Package OpenNeko (${{ matrix.target }})
    needs: [validate-release, release-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-15
            rust-target: aarch64-apple-darwin
            ffmpeg-install: brew untap aws/tap >/dev/null 2>&1 || true; brew install ffmpeg pkg-config
          - target: linux-x64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            ffmpeg-install: sudo apt-get update && sudo apt-get install -y clang libclang-dev libasound2-dev libavcodec-dev libavdevice-dev libavfilter-dev libavformat-dev libavutil-dev libssl-dev libswresample-dev libswscale-dev libudev-dev libva-dev libvulkan-dev libwayland-dev libx11-dev libxcursor-dev libxfixes-dev libxi-dev libxkbcommon-dev libxrandr-dev patchelf pkg-config
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Project release manifest versions
        run: node scripts/project-release-version.mjs

      - name: Enable Corepack
        run: corepack enable

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/neko-engine
          key: release-${{ matrix.target }}

      - name: Install FFmpeg
        run: ${{ matrix.ffmpeg-install }}
        shell: bash

      - name: Prepare configured FFmpeg build SDK
        run: node packages/neko-engine/scripts/download-ffmpeg.js --platform ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: Remove vendor source override
        run: rm -f packages/neko-engine/.cargo/config.toml
        shell: bash

      - name: Build host-napi
        working-directory: packages/neko-engine/packages/host-napi
        env:
          FFMPEG_DIR: ${{ github.workspace }}/packages/neko-engine/deps/ffmpeg
        run: pnpm run build:napi -- --target ${{ matrix.rust-target }}

      - name: Package Engine payload
        working-directory: packages/neko-engine
        run: bash scripts/package-platform.sh ${{ matrix.target }}

      - name: Assemble OpenNeko platform VSIX
        run: node scripts/package-openneko-platform.mjs --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v6
        with:
          name: openneko-vsix-${{ matrix.target }}
          path: vsix-artifacts/OpenNeko-${{ matrix.target }}-*.vsix
          retention-days: 7

  # ── Collect all artifacts and create release ──
  create-release:
    name: Create GitHub Release
    needs: [release-openneko]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: |
          echo "## Release artifacts:" >> $GITHUB_STEP_SUMMARY
          ls -lh release-artifacts/*.vsix | awk '{print "- " $NF " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY

      - name: Validate exact release artifact set
        env:
          RELEASE_ARTIFACT_DIRECTORY: release-artifacts
        run: node scripts/assert-openneko-release-artifacts.mjs

      - name: Generate SHA256 manifest
        working-directory: release-artifacts
        run: sha256sum *.vsix > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/OpenNeko-darwin-arm64-*.vsix
            release-artifacts/OpenNeko-linux-x64-*.vsix
            release-artifacts/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
