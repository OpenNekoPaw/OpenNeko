name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  promotion-source:
    name: Validate dev to main promotion
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Validate promotion source
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_BASE_REF: ${{ github.base_ref }}
        run: node scripts/test-orchestration/assert-promotion-source.mjs

  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        if: ${{ env.ACT != 'true' }}
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Install native build dependencies
        if: ${{ env.ACT != 'true' || env.ACT_NATIVE_DEPS_READY != 'true' }}
        run: |
          sudo apt-get update
          xargs sudo apt-get install -y < scripts/act/native-build-packages.txt

      - run: pnpm check:build

  local-metadata-runtime:
    name: Local Metadata Runtime (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Enable Corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:local-metadata-runtimes -- --probe-bun
      - run: pnpm --dir packages/neko-types exec vitest run src/vscode/extension/__tests__/node-sqlite-local-metadata-store.test.ts
      - run: pnpm --filter @neko/app-tui test:sqlite:bun
      - run: pnpm --filter @neko/app-tui build

  test-ts:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/cache@v5
        if: ${{ env.ACT != 'true' }}
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Run TypeScript tests
        run: |
          if [ "${ACT:-}" = "true" ]; then
            pnpm exec turbo run test --concurrency=1 --continue=always -- --coverage
          else
            pnpm check:test
          fi

      - uses: actions/upload-artifact@v6
        if: ${{ always() && env.ACT != 'true' }}
        with:
          name: coverage-reports
          path: packages/**/coverage/
          retention-days: 14

  test-rust:
    name: Rust Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/neko-engine

      - name: Cache Homebrew packages
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-ffmpeg-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: homebrew-ffmpeg-${{ runner.os }}-

      - name: Install FFmpeg (macOS)
        run: brew install ffmpeg pkg-config

      - name: Remove vendor source override
        run: rm -f packages/neko-engine/.cargo/config.toml

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: packages/neko-engine

      - name: Clippy lint
        run: cargo clippy --workspace -- -D warnings
        working-directory: packages/neko-engine

      - name: Run tests
        run: cargo test --workspace
        working-directory: packages/neko-engine

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: rm -f packages/neko-engine/.cargo/config.toml
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: packages/neko-engine/Cargo.toml

  proto-check:
    name: Proto Types Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:proto-sync

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/cache@v5
        if: ${{ env.ACT != 'true' }}
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:repository-quality

  openspec-check:
    name: OpenSpec Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:openspec

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: on-failure

  package-openneko-vsix:
    name: Package OpenNeko VSIX (${{ matrix.target }})
    needs: [build, test-ts, test-rust]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-15
            rust-target: aarch64-apple-darwin
            ffmpeg-install: brew untap aws/tap >/dev/null 2>&1 || true; brew install ffmpeg pkg-config
          - target: linux-x64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            ffmpeg-install: sudo apt-get update && sudo apt-get install -y clang libclang-dev libasound2-dev libavcodec-dev libavdevice-dev libavfilter-dev libavformat-dev libavutil-dev libssl-dev libswresample-dev libswscale-dev libudev-dev libva-dev libvulkan-dev libwayland-dev libx11-dev libxcursor-dev libxfixes-dev libxi-dev libxkbcommon-dev libxrandr-dev patchelf pkg-config
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/neko-engine
          key: ${{ matrix.target }}

      - name: Install FFmpeg
        run: ${{ matrix.ffmpeg-install }}
        shell: bash

      - run: pnpm install --frozen-lockfile

      - name: Remove vendor source override
        run: rm -f packages/neko-engine/.cargo/config.toml
        shell: bash

      - name: Build host-napi
        working-directory: packages/neko-engine/packages/host-napi
        run: pnpm run build:napi -- --target ${{ matrix.rust-target }}

      - name: Package Engine payload
        working-directory: packages/neko-engine
        run: bash scripts/package-platform.sh ${{ matrix.target }}

      - name: Assemble OpenNeko platform VSIX
        run: node scripts/package-openneko-platform.mjs --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v6
        with:
          name: openneko-vsix-${{ matrix.target }}
          path: vsix-artifacts/OpenNeko-${{ matrix.target }}-*.vsix
          retention-days: 30

  manual-gate:
    name: Manual Gate
    if: always() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - build
      - local-metadata-runtime
      - test-ts
      - test-rust
      - cargo-deny
      - proto-check
      - code-quality
      - openspec-check
      - package-openneko-vsix
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Assert required manual jobs
        env:
          CI_GATE_RESULTS: ${{ toJson(needs) }}
        run: >-
          node scripts/test-orchestration/assert-ci-gate-results.mjs
          "Manual Gate"
          build
          local-metadata-runtime
          test-ts
          test-rust
          cargo-deny
          proto-check
          code-quality
          openspec-check
          package-openneko-vsix

  merge-gate:
    name: Merge Gate
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - build
      - local-metadata-runtime
      - test-ts
      - test-rust
      - cargo-deny
      - proto-check
      - code-quality
      - openspec-check
      - package-openneko-vsix
      - promotion-source
      - dependency-review
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Assert required merge jobs
        env:
          CI_GATE_RESULTS: ${{ toJson(needs) }}
        run: >-
          node scripts/test-orchestration/assert-ci-gate-results.mjs
          "Merge Gate"
          build
          local-metadata-runtime
          test-ts
          test-rust
          cargo-deny
          proto-check
          code-quality
          openspec-check
          package-openneko-vsix
          promotion-source
          dependency-review
