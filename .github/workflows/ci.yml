name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

# ──────────────────────────────────────────────
# Reusable setup anchors (YAML anchors not supported in GHA,
# so we use a composite pattern with shared steps)
# ──────────────────────────────────────────────

jobs:
  # ── Path change detection ──────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ts: ${{ steps.filter.outputs.ts }}
      rust: ${{ steps.filter.outputs.rust }}
      proto: ${{ steps.filter.outputs.proto }}
      openspec: ${{ steps.filter.outputs.openspec }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          changed_files="$(mktemp)"
          event_name="${{ github.event_name }}"

          if [[ "${event_name}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            git diff --name-only "${base_sha}" "${head_sha}" > "${changed_files}"
          else
            before_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"

            if [[ -z "${before_sha}" || "${before_sha}" =~ ^0+$ ]]; then
              if git rev-parse "${head_sha}^" >/dev/null 2>&1; then
                before_sha="$(git rev-parse "${head_sha}^")"
                git diff --name-only "${before_sha}" "${head_sha}" > "${changed_files}"
              else
                git ls-files > "${changed_files}"
              fi
            else
              git diff --name-only "${before_sha}" "${head_sha}" > "${changed_files}"
            fi
          fi

          node scripts/test-orchestration/detect-ci-changes.mjs \
            --github-output "${GITHUB_OUTPUT}" < "${changed_files}"

  # ── TypeScript: Build & Lint ───────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        if: ${{ env.ACT != 'true' }}
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile
      - name: Install native build dependencies
        if: ${{ env.ACT != 'true' || env.ACT_NATIVE_DEPS_READY != 'true' }}
        run: |
          sudo apt-get update
          xargs sudo apt-get install -y < scripts/act/native-build-packages.txt

      - run: pnpm check:build

  local-metadata-runtime:
    name: Local Metadata Runtime (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Enable Corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:local-metadata-runtimes -- --probe-bun
      - run: pnpm --dir packages/neko-types exec vitest run src/vscode/extension/__tests__/node-sqlite-local-metadata-store.test.ts
      - run: pnpm --filter @neko/app-tui test:sqlite:bun
      - run: pnpm --filter @neko/app-tui build

  # ── TypeScript: Tests ──────────────────────
  test-ts:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/cache@v5
        if: ${{ env.ACT != 'true' }}
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile
      - name: Run TypeScript tests
        run: |
          if [ "${ACT:-}" = "true" ]; then
            pnpm exec turbo run test --concurrency=1 --continue=always -- --coverage
          else
            pnpm check:test
          fi

      - uses: actions/upload-artifact@v6
        if: ${{ always() && env.ACT != 'true' }}
        with:
          name: coverage-reports
          path: packages/**/coverage/
          retention-days: 14

  # ── Rust: Format, Lint & Test ──────────────
  test-rust:
    name: Rust Tests
    runs-on: macos-15
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/neko-engine

      - name: Cache Homebrew packages
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-ffmpeg-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: homebrew-ffmpeg-${{ runner.os }}-

      - name: Install FFmpeg (macOS)
        run: brew install ffmpeg pkg-config

      # vendor/ is gitignored; remove the cargo config that forces vendored sources
      - name: Remove vendor source override
        run: rm -f packages/neko-engine/.cargo/config.toml

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: packages/neko-engine

      - name: Clippy lint
        run: cargo clippy --workspace -- -D warnings
        working-directory: packages/neko-engine

      - name: Run tests
        run: cargo test --workspace
        working-directory: packages/neko-engine

  # ── Rust: Dependency audit ─────────────────
  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
      # vendor/ is gitignored; remove the cargo config that forces vendored sources
      - run: rm -f packages/neko-engine/.cargo/config.toml
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: packages/neko-engine/Cargo.toml

  # ── Proto: Type generation check ───────────
  proto-check:
    name: Proto Types Sync
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile
      - name: Regenerate proto types
        run: pnpm generate:types
      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet packages/neko-types/src/generated/; then
            echo "::error::Generated proto types are out of sync. Run 'pnpm generate:types' and commit."
            git diff packages/neko-types/src/generated/
            exit 1
          fi

  # ── Code Quality: Unused code & architecture ─
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/cache@v5
        if: ${{ env.ACT != 'true' }}
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Repository quality gates
        run: pnpm check:repository-quality

  # ── OpenSpec: proposal/spec validation ─────
  openspec-check:
    name: OpenSpec Validation
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.openspec == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile

      - name: Validate OpenSpec artifacts
        run: pnpm check:openspec

  # ── Security: Dependency review (PR only) ──
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: on-failure

  branch-gate:
    name: Branch Gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - build
      - local-metadata-runtime
      - test-ts
      - test-rust
      - cargo-deny
      - proto-check
      - code-quality
      - openspec-check
      - dependency-review
    if: always() && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Assert required branch jobs
        env:
          CI_GATE_RESULTS: ${{ toJson(needs) }}
        run: >-
          node scripts/test-orchestration/assert-ci-gate-results.mjs
          "Branch Gate"
          changes
          build
          local-metadata-runtime
          test-ts
          code-quality
          dependency-review

  # ── Release: TS extensions VSIX packaging ────
  # Runs on push to main only. Packages all TS-only extensions.
  package-ts-vsix:
    name: Package TS Extensions VSIX
    runs-on: ubuntu-latest
    needs: [build, test-ts]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/cache@v5
        if: ${{ env.ACT != 'true' }}
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Build TS extensions
        run: pnpm compile:ts-vsix

      - name: Package TS extensions
        run: |
          mkdir -p vsix-artifacts
          {
            node scripts/read-package-group.mjs packages.tsExtensions
            node scripts/read-package-group.mjs extensionPack
          } | while IFS= read -r pkg; do
            [ -n "$pkg" ] || continue
            pkg_path="$pkg"
            if [[ "$pkg_path" != */* ]]; then pkg_path="packages/$pkg_path"; fi
            if [ -d "$pkg_path" ]; then
              echo "📦 Packaging $pkg_path..."
              rm -f "$pkg_path"/*.vsix
              (cd "$pkg_path" && npx @vscode/vsce package --no-dependencies --allow-missing-repository)
              if ! compgen -G "$pkg_path/*.vsix" > /dev/null; then
                echo "::error::Packaging $pkg_path did not produce a new VSIX artifact."
                exit 1
              fi
              cp -f "$pkg_path"/*.vsix vsix-artifacts/
            fi
          done

          if ! compgen -G "vsix-artifacts/*.vsix" > /dev/null; then
            echo "::error::No TS extension VSIX artifacts were collected."
            exit 1
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: ts-extensions-vsix
          path: vsix-artifacts/*.vsix
          retention-days: 30

  # ── Release: Platform-specific neko-engine VSIX packaging ────
  # Runs on push to main only. Builds native addon + bundles ORT/FFmpeg
  # per platform, producing a platform-specific VSIX for each target.
  package-engine-vsix:
    name: Package neko-engine VSIX (${{ matrix.target }})
    needs: [build, test-ts, test-rust]
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-15
            rust-target: aarch64-apple-darwin
            ffmpeg-install: brew install ffmpeg pkg-config
          - target: linux-x64
            os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            ffmpeg-install: sudo apt-get update && sudo apt-get install -y clang libclang-dev libasound2-dev libavcodec-dev libavdevice-dev libavfilter-dev libavformat-dev libavutil-dev libssl-dev libswresample-dev libswscale-dev libudev-dev libva-dev libvulkan-dev libwayland-dev libx11-dev libxcursor-dev libxfixes-dev libxi-dev libxkbcommon-dev libxrandr-dev patchelf pkg-config
          - target: win32-x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            ffmpeg-install: node packages/neko-engine/scripts/download-ffmpeg.js --platform win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/neko-engine
          key: ${{ matrix.target }}

      - name: Install FFmpeg
        run: ${{ matrix.ffmpeg-install }}
        shell: bash

      - run: pnpm install --frozen-lockfile

      # vendor/ is gitignored; remove the cargo config that forces vendored sources
      - name: Remove vendor source override
        run: rm -f packages/neko-engine/.cargo/config.toml
        shell: bash

      # Build the native .node for this platform
      - name: Build host-napi
        working-directory: packages/neko-engine/packages/host-napi
        run: pnpm run build:napi -- --target ${{ matrix.rust-target }}

      # Package platform-specific VSIX (handles ORT + FFmpeg bundling)
      - name: Package platform VSIX
        working-directory: packages/neko-engine
        run: bash scripts/package-platform.sh ${{ matrix.target }}

      - uses: actions/upload-artifact@v6
        with:
          name: neko-engine-vsix-${{ matrix.target }}
          path: packages/neko-engine/*.vsix
          retention-days: 30

  main-gate:
    name: Main Gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - build
      - local-metadata-runtime
      - test-ts
      - test-rust
      - cargo-deny
      - proto-check
      - code-quality
      - openspec-check
      - dependency-review
      - package-ts-vsix
      - package-engine-vsix
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Assert required main jobs
        env:
          CI_GATE_RESULTS: ${{ toJson(needs) }}
        run: >-
          node scripts/test-orchestration/assert-ci-gate-results.mjs
          "Main Gate"
          changes
          build
          local-metadata-runtime
          test-ts
          test-rust
          cargo-deny
          code-quality
          openspec-check
          package-ts-vsix
          package-engine-vsix
